<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

  <div class="max-w-6xl mx-auto p-4 sm:p-6 flex flex-col lg:flex-row gap-4 sm:gap-6">

    <!-- USERS LIST -->
    <div class="w-full lg:w-1/3 bg-slate-900 p-4 rounded-xl shadow">
      <h2 class="text-lg sm:text-xl font-bold mb-4 text-blue-400">Users</h2>
      <div id="usersList" class="space-y-2"></div>
    </div>

    <!-- CHAT BOX -->
    <div class="w-full lg:w-2/3 bg-slate-900 p-4 rounded-xl shadow flex flex-col min-h-[60vh] sm:min-h-[75vh]">

      <h2 id="chatWith" class="text-lg sm:text-xl font-bold mb-4">
        Select a user
      </h2>

      <p id="typingIndicator" class="text-sm text-slate-400 mb-3 h-5"></p>

      <div id="chatBox" class="flex-1 overflow-y-auto space-y-2 mb-4 pr-2"></div>

      <div class="flex gap-2">
        <input id="msgInput" type="text" placeholder="Type message..."
          class="flex-1 p-3 bg-slate-800 rounded-lg text-white outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" />
        <button id="sendBtn" class="bg-blue-600 hover:bg-blue-700 px-4 sm:px-6 rounded-lg font-bold transition text-sm sm:text-base">
          Send
        </button>
      </div>

    </div>

  </div>

  <script type="module" src="./js/messages.js"></script>
</body>
</html>

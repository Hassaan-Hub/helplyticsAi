<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    #chatBox > div {
      max-width: 80% !important;
      min-width: 120px !important;
      font-size: 0.875rem !important;
      padding: 0.5rem 0.75rem !important;
      border-radius: 1rem !important;
      word-break: break-word !important;
    }
    #chatBox > div.bg-blue-600 {
      border-bottom-right-radius: 0.25rem !important;
    }
    #chatBox > div.bg-slate-800 {
      border-bottom-left-radius: 0.25rem !important;
    }
    @media (min-width: 640px) {
      #chatBox > div {
        max-width: 60% !important;
        min-width: 160px !important;
        font-size: 1rem !important;
        padding: 0.75rem 1rem !important;
      }
    }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

  <div class="h-screen flex flex-col lg:flex-row gap-0">

    <!-- USERS LIST -->
    <div class="w-full lg:w-1/3 bg-slate-900 lg:border-r border-slate-800 flex flex-col lg:h-screen">
      <div class="p-4 border-b border-slate-800 flex items-center justify-between">
        <h2 class="text-lg sm:text-xl font-bold text-blue-400">Users</h2>
        <a href="dashboard.html" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg font-bold transition text-sm">← Dashboard</a>
      </div>
      <div id="usersList" class="flex-1 overflow-y-auto p-4 space-y-1"></div>
    </div>

    <!-- CHAT BOX -->
    <div class="w-full lg:w-2/3 flex flex-col h-[calc(100vh-4rem)] lg:h-screen bg-slate-900">

      <!-- Chat Header -->
      <div class="p-4 border-b border-slate-800 flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold shrink-0">U</div>
        <h2 id="chatWith" class="text-base sm:text-xl font-bold">Select a user</h2>
      </div>

      <p id="typingIndicator" class="text-xs sm:text-sm text-slate-400 px-4 py-2 h-8"></p>

      <!-- Messages -->
      <div id="chatBox" class="flex-1 overflow-y-auto space-y-1 p-3 sm:p-4"></div>

      <!-- Input -->
      <div class="p-3 sm:p-4 border-t border-slate-800">
        <div class="flex gap-2">
          <input id="msgInput" type="text" placeholder="Type message..."
            class="flex-1 p-3 bg-slate-800 rounded-full text-white outline-none focus:ring-2 focus:ring-blue-500 text-sm" />
          <button id="sendBtn" class="bg-blue-600 hover:bg-blue-700 px-4 sm:px-6 rounded-full font-bold transition text-sm shrink-0">
            Send
          </button>
        </div>
      </div>

    </div>

  </div>

  <script type="module" src="./js/messages.js"></script>
</body>
</html>

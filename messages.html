<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Messages</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">

    <div class="max-w-6xl mx-auto p-6 flex gap-6">

        <!-- USERS LIST -->
        <div class="w-1/3 bg-slate-900 p-4 rounded-xl">
            <h2 class="text-xl font-bold mb-4">
                Users
            </h2>

            <div id="usersList"></div>
        </div>

        <!-- CHAT BOX -->
        <div class="w-2/3 bg-slate-900 p-4 rounded-xl flex flex-col">

            <h2 id="chatWith" class="text-xl font-bold mb-4">
                <p id="typingIndicator" class="text-sm text-slate-400 mb-3"></p>
                Select a user
            </h2>

            <div id="chatBox" class="flex-1 overflow-y-auto space-y-2 mb-4"></div>

            <div class="flex gap-2">

                <input id="msgInput" type="text" placeholder="Type message..."
                    class="flex-1 p-3 bg-slate-800 rounded-lg" />

                <button id="sendBtn" class="bg-blue-600 px-4 rounded-lg">
                    Send
                </button>

            </div>

        </div>

    </div>

    <script type="module" src="./js/messages.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">

    <div class="flex">

        <!-- Sidebar -->
        <aside class="w-64 h-screen bg-slate-900 p-5">
            <h1 class="text-2xl font-bold mb-8">
                Helplytics AI
            </h1>

            <ul class="space-y-4">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="create-request.html">Create Request</a></li>
                <li><a href="explore.html">Explore</a></li>
                <li><a href="messages.html">Messages</a></li>
                <li><a href="notifications.html">Notifications</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>

            <button id="logoutBtn" class="mt-10 bg-red-600 px-4 py-2 rounded">
                Logout
            </button>
        </aside>

        <!-- Main -->
        <main class="flex-1 p-8">

            <h2 id="welcome" class="text-3xl font-bold mb-8">
                Welcome
            </h2>

            <div class="grid grid-cols-4 gap-6">

                <div class="bg-slate-900 p-6 rounded-xl">
                    <h3>Total Requests</h3>
                    <p class="text-3xl mt-2">0</p>
                </div>

                <div class="bg-slate-900 p-6 rounded-xl">
                    <h3>Completed</h3>
                    <p class="text-3xl mt-2">0</p>
                </div>

                <div class="bg-slate-900 p-6 rounded-xl">
                    <h3>Trust Score</h3>
                    <p class="text-3xl mt-2">0</p>
                </div>

                <div class="bg-slate-900 p-6 rounded-xl">
                    <h3>Badge</h3>
                    <p class="text-3xl mt-2">Beginner</p>
                </div>

                <a href="create-request.html" class="bg-blue-600 px-5 py-3 rounded-lg">
                    Create Request
                </a>
            </div>

        </main>

    </div>

    <script type="module" src="./js/dashboard.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-950 text-white">

  <div class="flex flex-col lg:flex-row">

    <!-- Sidebar -->
    <aside class="hidden lg:flex w-64 h-screen bg-slate-900 p-5 flex-col">
      <h1 class="text-2xl font-bold mb-8 text-blue-400">Helplytics AI</h1>
      <nav class="flex-1">
        <ul class="space-y-2">
          <li><a href="dashboard.html" class="block p-3 rounded-lg bg-blue-600 font-semibold">Dashboard</a></li>
          <li><a href="create-request.html" class="block p-3 rounded-lg hover:bg-slate-800 transition">Create Request</a></li>
          <li><a href="explore.html" class="block p-3 rounded-lg hover:bg-slate-800 transition">Explore</a></li>
          <li><a href="messages.html" class="block p-3 rounded-lg hover:bg-slate-800 transition">Messages</a></li>
          <li><a href="notifications.html" class="block p-3 rounded-lg hover:bg-slate-800 transition">Notifications</a></li>
          <li><a href="profile.html" class="block p-3 rounded-lg hover:bg-slate-800 transition">Profile</a></li>
        </ul>
      </nav>
      <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 px-4 py-3 rounded-lg font-bold transition">Logout</button>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-4 sm:p-6 lg:p-8">

      <h2 id="welcome" class="text-2xl sm:text-3xl font-bold mb-6 sm:mb-8">Welcome</h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 mb-6 sm:mb-8">

        <div class="bg-slate-900 p-5 sm:p-6 rounded-xl shadow">
          <h3 class="text-slate-400 text-xs sm:text-sm uppercase tracking-wider">Total Requests</h3>
          <p class="text-3xl sm:text-4xl font-bold mt-2">0</p>
        </div>

        <div class="bg-slate-900 p-5 sm:p-6 rounded-xl shadow">
          <h3 class="text-slate-400 text-xs sm:text-sm uppercase tracking-wider">Completed</h3>
          <p class="text-3xl sm:text-4xl font-bold mt-2">0</p>
        </div>

        <div class="bg-slate-900 p-5 sm:p-6 rounded-xl shadow">
          <h3 class="text-slate-400 text-xs sm:text-sm uppercase tracking-wider">Trust Score</h3>
          <p class="text-3xl sm:text-4xl font-bold mt-2">0</p>
        </div>

        <div class="bg-slate-900 p-5 sm:p-6 rounded-xl shadow">
          <h3 class="text-slate-400 text-xs sm:text-sm uppercase tracking-wider">Badge</h3>
          <p class="text-3xl sm:text-4xl font-bold mt-2">Beginner</p>
        </div>

      </div>

      <a href="create-request.html" class="inline-block bg-blue-600 hover:bg-blue-700 px-5 sm:px-6 py-3 rounded-lg font-bold transition text-sm sm:text-base">
        + Create Request
      </a>

    </main>

  </div>

  <script type="module" src="./js/dashboard.js"></script>
</body>
</html>

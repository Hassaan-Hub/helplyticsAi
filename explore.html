<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explore Requests</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

  <div class="flex flex-col lg:flex-row">

    <!-- Desktop Sidebar -->
    <aside class="hidden lg:flex w-64 h-screen bg-slate-900 p-5 flex-col">
      <h1 class="text-2xl font-bold mb-8 text-blue-400">Helplytics AI</h1>
      <nav class="flex-1">
        <ul class="space-y-2">
          <li><a href="dashboard.html" class="block p-3 rounded-lg hover:bg-slate-800 transition">Dashboard</a></li>
          <li><a href="create-request.html" class="block p-3 rounded-lg hover:bg-slate-800 transition">Create Request</a></li>
          <li><a href="explore.html" class="block p-3 rounded-lg bg-blue-600 font-semibold">Explore</a></li>
          <li><a href="messages.html" class="block p-3 rounded-lg hover:bg-slate-800 transition">Messages</a></li>
          <li><a href="notifications.html" class="block p-3 rounded-lg hover:bg-slate-800 transition">Notifications</a></li>
          <li><a href="profile.html" class="block p-3 rounded-lg hover:bg-slate-800 transition">Profile</a></li>
        </ul>
      </nav>
      <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 px-4 py-3 rounded-lg font-bold transition">Logout</button>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-4 sm:p-6 lg:p-8">

      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 sm:mb-8">
        <h1 class="text-2xl sm:text-4xl font-bold">Explore Requests</h1>
        <a href="dashboard.html" class="bg-slate-800 hover:bg-slate-700 px-5 py-3 rounded-lg font-bold transition text-sm sm:text-base">← Dashboard</a>
      </div>

      <!-- Filters -->
      <div class="flex flex-col sm:flex-row gap-4 mb-6 sm:mb-8">
        <select id="categoryFilter" class="bg-slate-900 p-3 rounded-lg text-white outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-auto">
          <option value="All">All Categories</option>
          <option value="Programming">Programming</option>
          <option value="Design">Design</option>
          <option value="General">General</option>
        </select>

        <select id="urgencyFilter" class="bg-slate-900 p-3 rounded-lg text-white outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-auto">
          <option value="All">All Urgency</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>

      <!-- Requests -->
      <div id="requestsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
        <div class="col-span-full flex justify-center py-10">
          <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        </div>
      </div>

    </main>

  </div>

  <script type="module" src="./js/explore.js"></script>
</body>
</html>

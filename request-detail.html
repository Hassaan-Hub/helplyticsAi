<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Request Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

  <div class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">

    <div class="bg-slate-900 p-6 sm:p-8 rounded-2xl shadow-lg">

      <h1 id="title" class="text-2xl sm:text-4xl font-bold mb-6"></h1>

      <p id="description" class="text-slate-300 mb-6 text-sm sm:text-base leading-relaxed"></p>

      <div class="space-y-3 mb-8 text-sm sm:text-base">
        <p id="category" class="bg-slate-800 inline-block px-4 py-2 rounded-lg"></p>
        <p id="urgency" class="bg-slate-800 inline-block px-4 py-2 rounded-lg"></p>
        <p id="status" class="bg-slate-800 inline-block px-4 py-2 rounded-lg"></p>
      </div>

      <div class="mb-8">
        <h3 class="text-lg sm:text-xl font-bold mb-3 text-blue-400">Helpers</h3>
        <ul id="helpersList" class="space-y-2 text-slate-300 text-sm sm:text-base"></ul>
      </div>

      <div class="flex flex-col sm:flex-row gap-4">
        <button id="helpBtn" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-bold transition text-sm sm:text-base">
          I Can Help
        </button>
        <button id="solveBtn" class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-lg font-bold transition text-sm sm:text-base">
          Mark As Solved
        </button>
      </div>

    </div>

  </div>

  <script type="module" src="./js/request-detail.js"></script>
</body>
</html>

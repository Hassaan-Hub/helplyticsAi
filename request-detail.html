<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Request Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen">

    <div class="max-w-4xl mx-auto p-8">

        <div class="bg-slate-900 p-8 rounded-2xl">

            <h1 id="title" class="text-4xl font-bold mb-6"></h1>

            <p id="description" class="text-slate-300 mb-6"></p>

            <div class="space-y-3 mb-8">

                <p id="category"></p>
                <p id="urgency"></p>
                <p id="status"></p>

            </div>

            <div class="mb-8">
                <h3 class="text-xl font-bold mb-3">
                    Helpers
                </h3>

                <ul id="helpersList"></ul>
            </div>

            <div class="flex gap-4">

                <button id="helpBtn" class="bg-blue-600 px-6 py-3 rounded-lg">
                    I Can Help
                </button>

                <button id="solveBtn" class="bg-green-600 px-6 py-3 rounded-lg">
                    Mark As Solved
                </button>

            </div>

        </div>

    </div>

    <script type="module" src="./js/request-detail.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-950 flex justify-center items-center min-h-screen px-4">

  <div class="bg-slate-900 p-6 sm:p-8 rounded-2xl w-full max-w-md shadow-lg">
    <h1 class="text-2xl sm:text-3xl text-white font-bold mb-6 text-center">
      Complete Your Profile
    </h1>

    <form id="onboardingForm" class="space-y-4">

      <input
        type="text"
        id="skills"
        placeholder="Skills (HTML, CSS, JS)"
        required
        class="w-full p-3 rounded-lg bg-slate-800 text-white outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base"
      />

      <input
        type="text"
        id="interests"
        placeholder="Interests"
        required
        class="w-full p-3 rounded-lg bg-slate-800 text-white outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base"
      />

      <input
        type="text"
        id="location"
        placeholder="Location"
        required
        class="w-full p-3 rounded-lg bg-slate-800 text-white outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base"
      />

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg text-white font-bold text-sm sm:text-base"
      >
        Save Profile
      </button>

    </form>
  </div>

  <script type="module" src="./js/onboarding.js"></script>
</body>
</html>

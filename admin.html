<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

  <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 sm:mb-8">
      <h1 class="text-2xl sm:text-4xl font-bold">👨‍💼 Admin Panel</h1>
      <a href="dashboard.html" class="bg-slate-800 hover:bg-slate-700 px-5 py-3 rounded-lg font-bold transition text-sm sm:text-base">← Dashboard</a>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 sm:gap-6 mb-6 sm:mb-10">

      <div class="bg-slate-900 p-5 sm:p-6 rounded-xl shadow">
        <h2 class="text-slate-400 text-sm uppercase tracking-wider">Total Users</h2>
        <p id="totalUsers" class="text-3xl sm:text-4xl font-bold mt-2">0</p>
      </div>

      <div class="bg-slate-900 p-5 sm:p-6 rounded-xl shadow">
        <h2 class="text-slate-400 text-sm uppercase tracking-wider">Total Requests</h2>
        <p id="totalRequests" class="text-3xl sm:text-4xl font-bold mt-2">0</p>
      </div>

      <div class="bg-slate-900 p-5 sm:p-6 rounded-xl shadow">
        <h2 class="text-slate-400 text-sm uppercase tracking-wider">Active Helpers</h2>
        <p id="activeHelpers" class="text-3xl sm:text-4xl font-bold mt-2">0</p>
      </div>

    </div>

    <!-- USERS TABLE -->
    <h2 class="text-xl sm:text-2xl font-bold mb-4 text-blue-400">Users</h2>
    <div id="usersTable" class="space-y-3 mb-8 sm:mb-10"></div>

    <!-- REQUESTS TABLE -->
    <h2 class="text-xl sm:text-2xl font-bold mb-4 text-purple-400">Requests</h2>
    <div id="requestsTable" class="space-y-3"></div>

  </div>

  <script type="module" src="./js/admin.js"></script>
</body>
</html>
